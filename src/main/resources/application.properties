spring.application.name=geolocation-service
server.port=8083

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/geolocation_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# CORS - orĒgenes permitidos (ajustar seg·n URL del frontend)
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:5173

