spring.application.name=geolocation-service
server.port=8084

spring.datasource.url=${GEO_DB_URL:jdbc:postgresql://localhost:5432/geolocation_db}
spring.datasource.username=${GEO_DB_USER:postgres}
spring.datasource.password=${GEO_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:5173
